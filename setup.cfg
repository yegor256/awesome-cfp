[tool:pytest]
testpaths =
    compile.py
    test_compile.py
addopts =
    --doctest-modules
    --cov=compile
    --cov-report=term-missing:skip-covered
    --cov-fail-under=100
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    content: tests for check links in cfp.yml file

[flake8]
max-line-length = 120
exps-for-one-empty-line = 0
ignore =
    # Ignore missing docstrings
    D,
    SVN500,
    WPS202,
inline-quotes = "
